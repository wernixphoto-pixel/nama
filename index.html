<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Lower Third Fade Out</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{
    width:100%;
    height:100%;
    overflow:hidden;
    background:transparent;
    font-family:Arial, Helvetica, sans-serif;
}

.lower-third{
    position:absolute;
    left:50px;
    bottom:50px;
    width:900px;
    height:150px;
}

/* =========================
   BAR UTAMA
========================= */

.main-bar{

    position:absolute;

    width:850px;
    height:90px;

    background:
    linear-gradient(
        to bottom,
        #2b2b2b,
        #000000
    );

    clip-path:polygon(
        0% 0%,
        92% 0%,
        100% 100%,
        8% 100%
    );

    display:flex;
    align-items:center;
    justify-content:center;

    color:#ffffff;
    font-size:34px;
    font-weight:bold;

    box-shadow:
        0 0 20px rgba(0,0,0,.45);

    transform:translateX(-120%);

    animation:
        slideMain 1s ease forwards,
        fadeOut 1s ease forwards 20s;
}

/* =========================
   BAR BAWAH
========================= */

.sub-bar{

    position:absolute;

    top:90px;
    left:160px;

    width:460px;
    height:55px;

    background:
    linear-gradient(
        to right,
        #ff9900,
        #ffd400
    );

    clip-path:polygon(
        6% 0%,
        100% 0%,
        94% 100%,
        0% 100%
    );

    display:flex;
    align-items:center;
    justify-content:center;

    color:#111111;
    font-size:24px;
    font-weight:bold;

    opacity:0;

    box-shadow:
        0 0 15px rgba(255,212,0,.35);

    animation:
        showSub .7s ease forwards .8s,
        fadeOut 1s ease forwards 20s;
}

/* =========================
   TEKS
========================= */

.text-main{

    opacity:0;

    animation:
        fadeText .8s ease forwards 1s,
        fadeOut 1s ease forwards 20s;
}

.text-sub{

    opacity:0;

    animation:
        fadeText .8s ease forwards 1.3s,
        fadeOut 1s ease forwards 20s;
}

/* =========================
   ANIMASI MASUK
========================= */

@keyframes slideMain{

    from{
        transform:translateX(-120%);
    }

    to{
        transform:translateX(0);
    }

}

@keyframes showSub{

    from{
        opacity:0;
        transform:translateX(-50px);
    }

    to{
        opacity:1;
        transform:translateX(0);
    }

}

@keyframes fadeText{

    from{
        opacity:0;
    }

    to{
        opacity:1;
    }

}

/* =========================
   FADE OUT
========================= */

@keyframes fadeOut{

    from{
        opacity:1;
    }

    to{
        opacity:0;
    }

}

</style>
</head>

<body>

<div class="lower-third" id="lowerThird">

    <div class="main-bar">

        <div class="text-main" id="nama">
            Mr. Jhon
        </div>

    </div>

    <div class="sub-bar">

        <div class="text-sub" id="jabatan">
            Katanya Pendeta
        </div>

    </div>

</div>

<script>

/* =========================
   URL PARAMETER
=========================

Contoh:

index.html?nama=Pendeta%20Markus&jabatan=Gembala%20Sidang

========================= */

const params = new URLSearchParams(
    window.location.search
);

document.getElementById("nama").textContent =
    params.get("nama") || "Mr. Jhon";

document.getElementById("jabatan").textContent =
    params.get("jabatan") || "Katanya Pendeta";

/* =========================
   HAPUS TOTAL SETELAH FADE
========================= */

setTimeout(function(){

    document.getElementById("lowerThird").remove();

},21000);

</script>

</body>
</html>
